<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        .bungee-regular {
            font-family: "Bungee", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .dbar{
            display: flex;
            bottom: 0px;
            width: 100%;
            height : 60px;
            background-color: rgb(140, 162, 132);
            align-items: flex-start;
            justify-content: start; 
            position:fixed;
        }
        .dbar > div{
            color : rgb(255, 255, 255);
            display: flex;
            height: auto;
            width: 100%;
            align-items: center;
            justify-content: center;    
            
        }
        .ubar{
            top: 0px;
            width: 100%;
            height : 60px;
            background-color: rgb(255, 255, 255);
            align-items: flex-start;
            justify-content: start; 
            position:fixed;
        }

        .ubar > div{
            color : rgb(0, 0, 0);
            display: flex;
            height: 60px;
            width: 20%;
            align-items: center;
            justify-content: center;  
        }
        .center{ 
            color: rgb(255, 255, 255);
            position: absolute;
            background-color: rgb(30, 45, 36);
            top: 32%;
            left: 50%;
            white-space: pre-wrap;
            transform: translate(-50%, -50%);

            font-size: 40px;
            z-index: 2;
            box-shadow:
            10px 10px rgb(194, 245, 176),
            -10px -10px rgb(147, 204, 108),
            12px 20px rgb(95, 154, 73),
            10px -5px rgb(121, 180, 99),
            -10px 15px rgb(72, 155, 26),
            -20px -25px rgb(86, 124, 72);

        }
        .center:hover{
            background-color: rgb(10, 137, 17);
        }
        .main_background{
            position: relative;
            background-size: contain;
            height: calc(100vh - 120px); 
            margin-top: 60px; 
            display: flex;
            align-items: center;
            justify-content: center; 
        }

        .main_background img{
            width: 100%;
            height: 100%;
            object-fit: cover;  
            display: block;
        }
        .body{
                margin: 0;
                padding: 0;
                height: 100vw;
        }
        .circle{
            color: rgb(255, 255, 255);
            font-size: 2vw;
            width: 4vw;
            height: 4vw;
            border-radius: 50%;
            background-color: rgb(71, 165, 37);
            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 
            5px 5px rgb(16, 49, 4);;
        }

        .Cir{
            position: absolute;
            display:none;
            width: 60%;
            height: 20%;
            margin-top: 60px;
            flex-direction: row;
            align-items: center;
            justify-content: space-between; 
            
            
        }


    </style>
    <script>
        function getnum(){
            let arr = []
            while(arr.length<7){
                let a = Math.floor(Math.random()*161115686867%45+1);
                if(arr.includes(a)){
                    continue;
                }
                arr.push(a)
            }
            arr=arr.sort((a,b)=>a -b);
            document.getElementById('cir').style.display = 'flex';
            document.getElementById('one').innerHTML = arr[0];
            document.getElementById('two').innerHTML = arr[1];
            document.getElementById('three').innerHTML = arr[2];
            document.getElementById('four').innerHTML = arr[3];
            document.getElementById('five').innerHTML = arr[4];
            document.getElementById('six').innerHTML = arr[5];
        }
    </script>
</head>
<body>
    <div class="dbar">
        <div class="text bungee-regular" style="white-space: pre-wrap;">
            Check the number that will be your   
            <strong style="font-size: 30px;">Luck</strong></div>
    </div>
    <div class="main_background ">
        <img src="clover2.jpg" style="width:100vw ">      
        <!--<h2 id="lotto">오늘의 행운 번호~!</h2>
        <input type="button" value="로또 번호 뽑기" onclick="getnum()">-->
        <div class="Cir bungee-regular" id="cir">
            <div id="one" class="circle"></div>
            <div id="two" class="circle"></div>
            <div id="three" class="circle"></div>
            <div id="four" class="circle"></div>
            <div id="five" class="circle"></div>
            <div id="six" class="circle"></div>   
        </div>
    </div>
    <p class="center bungee-regular" id="lotto" onclick="getnum()">Find My Lucky Number</p>
    
    <div class="ubar bungee-regular">
        <div>YNuM</div>
    </div>

    


</body>
</html>
